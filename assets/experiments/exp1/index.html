    <style>
      #popupMenu .modal-dialog {

      #popupMenu .modal-content {
        height: 80%;

        justify-content: flex-start;

        position: relative;
      }

        width: auto;
      }

      #popupMenu .modal-header .btn-close {
        position: absolute;
        right: 0.5rem;
        top: 50%;
        transform: translateY(-50%);
        background-color: transparent;
        border: none;
        font-size: 1.5rem;
        color: #373636;
        cursor: pointer;
        line-height: 0.5;
        font-weight: 700;
      }

      #popupMenu .modal-body {
        padding: 0.5rem 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
      }

      #popupMenuItems .nav-menu-body {
        width: 100%;
        text-align: center;
        display: block !important;
      }

      #popupMenuItems .nav-menu-body a {
        display: inline-block;
        padding: 0.5rem 0 !important;
        color: #3f617d;
        text-decoration: none;
        font-family: 'Raleway', sans-serif;
        font-size: 1.2rem;
        font-weight: 500;
        transition: color 0.2s ease;
      }

      #popupMenuItems .nav-menu-body a:hover,
      #popupMenuItems .nav-menu-body a.current-item {
        color: #2b4960;
        font-weight: 600;
      }
    </style>

    <!-- Active Menu Items Handler Script -->
    <script>
      window.addEventListener("DOMContentLoaded", (event) => {
        const setActiveItem = (id) => {
          const menu = document.getElementById(id);
          if (!menu) return;
          
          let marked = false;
          const links = menu.getElementsByTagName('a');
          
          for (let link of links) {
            if (link.href === window.location.href) {
              link.classList.add("current-item");
              marked = true;
            }
          }
          
          // Default backup highlighting fallback if exact route matching fails
          if (!marked && links.length > 0) {
            links[0].classList.add("current-item");
          }
        };
        setActiveItem("popupMenuItems");
        setActiveItem("menu");
      });
    </script>
