    <script>
      window.onload = function () {
        document.getElementById("simulation").className =
          "active treeview";
      };

      function resizeIframe(obj) {
        obj.style.height =
          obj.contentWindow.document.body.scrollHeight + "px";
        obj.style.width = "100%";
      }

      function disableContextMenu() {
        document.getElementById(
          "fraDisabled"
        ).contentWindow.document.oncontextmenu = function () {
          return false;
        };
      }

      $(document).keydown(function (e) {
        if (e.which === 123) {
          return false;
        }
      });

      function newPopup(url) {
        window.open(
          url,
          "popUpWindow",
          "height=500,width=400,left=10,top=10,resizable=yes,scrollbars=yes,toolbar=no,menubar=no,location=no,directories=no,status=yes"
        );
      }

      function loadSimulation(path) {
        var frame = document.getElementById("fraDisabled");
        frame.src = path;

        frame.onload = function () {
          try {
            resizeIframe(frame);
            disableContextMenu();
          } catch (e) {
            console.log(e);
          }
        };
      }
    </script>
